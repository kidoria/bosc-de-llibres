<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIDÒRIA - L'arbre que contava històries</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* ===== Estilos globales ===== */
  body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #FFFFFF;
    color: #000000;
  }

  header {
    background: #4DB6AC;
    color: white;
    padding: 20px 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

 h1 {
  text-align: center;
  font-size: 2em;      /* opcional: tamaño */
  margin-top: 20px;    /* opcional: espacio */
  margin-bottom: 20px; /* opcional */
  font-family: 'Poppins', sans-serif;
  color: #4DB6AC;
}
  }

  /* ===== Botones ===== */
.bot {
  text-align: center;
}

.bot button {
  background-color: #ef4e4e;
  color: #FFFFFF;
  padding: 2rem;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  transition: transform 0.2s, background-color 0.2s;
  text-align: center;
}

.bot button:hover {
  transform: scale(1.05);
  background-color: #4caf50;
}

  /* ===== Bloques de contenido ===== */
  .bloque {
    max-width: 1000px;
    margin: 60px auto;
    display: flex;
    gap: 40px;
    align-items: center;
    padding: 0 80px;
  }

  .alternado {
    flex-direction: row;
  }

  .bloque img {
    width: 50%;
    border-radius: 15px;
    transition: 0.4s;
  }

  .magico:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 30px #4caf50;
  }

  /* ===== Centrado botón actividad ===== */
/* Contenedor del footer */
footer {
  background-color: #f2f2f2; /* color de fondo similar a conte2.html */
  padding: 20px 0;
  text-align: center; /* centra todo dentro del footer */
  margin-top: 40px; /* separación del contenido */
}

/* Botón del footer */
.footer-button {
  display: inline-block;
  background-color: #4DB6AC; /* color azul */
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  font-size: 1rem;
  border: none;
  cursor: pointer;
  transition: background-color 0.3s;
}

.footer-button:hover {
  background-color: #4DB6AC; /* cambio de color al pasar el mouse */
}
  /* ===== Sección cuento (opcional) ===== */
  .cuento {
    padding: 20px;
  }

  @media (max-width: 768px) {
    .bloque {
      flex-direction: column;
      padding: 0 20px;
    }

    .bloque img {
      width: 100%;
    }
  }


      .imatges-logo img {
    width: 100%;
    max-width: 60px;
    display: block;
    margin: 0 auto 0rem auto;
    border-radius: 0px;

</style>
</head>
<body>

<header>
  <div class="imatges-logo img">
    <img src="Logo kidòria.png">
  </div>
</header>

<section class="cuento">
  <h1>L'arbre que contava històries</h1>

    <div class="bot">
      <button id="musica-btn">🔊 Música</button>
      <button id="narracio-btn">🎤 Narració</button>
    </div>

  <div class="bloque">
    <img src="Arbre1.jpg" class="magico">
    <p id="p1">Nuba soñaba con cruzar el gran valle dorado.</p>
  </div>

  <div class="bloque alternado">
    <p id="p2">Todos decían que era demasiado pequeño para intentarlo.</p>
    <img src="Arbre2.jpg" class="magico">
  </div>

  <div class="bloque alternado">
    <img src="Arbre3.jpg" class="magico">
    <p id="p3">Pero escuchó su corazón y dio el primer paso hacia la aventura.</p>
  </div>


<footer>
  <div class="footer-container">
    <a href="laberint.html" class="footer-button">RACÓ DE BITS</a>
  </div>
</footer>

</section>

</body>
</html>
