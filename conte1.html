<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIDÒRIA - L'arbre que contava històries</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* ===== Estilos globales ===== */
  body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #FFFFFF;
    color: #000000;
  }

  header {
    background: #4DB6AC;
    color: white;
    padding: 20px 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  h1, h2 {
    color: #4DB6AC;
    align-items: center;
  }

  /* ===== Botones ===== */
.bot {
  text-align: center;
}

.bot button {
  background-color: #ef4e4e;
  color: #FFFFFF;
  padding: 2rem;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  transition: transform 0.2s, background-color 0.2s;
}

.bot button:hover {
  transform: scale(1.05);
  background-color: #FFA64D;
}

  /* ===== Bloques de contenido ===== */
  .bloque {
    max-width: 1000px;
    margin: 60px auto;
    display: flex;
    gap: 40px;
    align-items: center;
    padding: 0 80px;
  }

  .alternado {
    flex-direction: row;
  }

  .bloque img {
    width: 50%;
    border-radius: 15px;
    transition: 0.4s;
  }

  .magico:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 30px #4caf50;
  }

  /* ===== Centrado botón actividad ===== */
  .line-container {
  position: center;         /* Para posicionar el botón relativo a la línea */
  height: none;                /* Grosor de la línea */
  background-color: #4db6ac;  /* Color de la línea */
  margin: 20px 0;             /* Espacio arriba y abajo */
}

.inside-button {
  position: center;         /* Posiciona el botón sobre la línea */
  top: 50%;                   /* Centrar verticalmente */
  left: 50%;                  /* Centrar horizontalmente */
  transform: translate(-50%, -50%); /* Ajuste perfecto al centro */
  padding: 5px 10px;
  border: none;
  background-color: #ffffff; /* Color del botón */
  color: 4db6ac;
  cursor: pointer;
  border-radius: 5px;
}
  /* ===== Sección cuento (opcional) ===== */
  .cuento {
    padding: 20px;
  }

  @media (max-width: 768px) {
    .bloque {
      flex-direction: column;
      padding: 0 20px;
    }

    .bloque img {
      width: 100%;
    }
  }

</style>
</head>
<body>

<header>
  <div class="logo">img src="Logo kidòria.png"</div>
</header>

<section class="cuento">
  <h1 id="titulo">L'arbre que contava històries</h1>

  <div class="bot">
    <button onclick="toggleMusica()">🎵 Música</button>
    <button onclick="toggleNarrador()">🎙️ Narrador</button>
  </div>

  <div class="bloque">
    <img src="Arbre1.jpg" class="magico">
    <p id="p1">Nuba soñaba con cruzar el gran valle dorado.</p>
  </div>

  <div class="bloque alternado">
    <p id="p2">Todos decían que era demasiado pequeño para intentarlo.</p>
    <img src="Arbre2.jpg" class="magico">
  </div>

  <div class="bloque alternado">
    <img src="Arbre3.jpg" class="magico">
    <p id="p3">Pero escuchó su corazón y dio el primer paso hacia la aventura.</p>
  </div>

 <div class="line-container">
  <div class="inside-button">
    <a href="laberint.html" class="boton-magico">Ir a la actividad infantil</a>
    Kidòria - Bosc d'històries
  </div>


</section>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<audio id="narrador">
  <source src="narrador.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
