<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Viaje de Nuba</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* ===== Estilos globales ===== */
  body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #FFFFFF;
    color: #000000;
  }

  header {
    background: #4DB6AC;
    color: white;
    padding: 20px 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  h1, h2 {
    color: #4DB6AC;
  }

  /* ===== Botones ===== */
  .boton-magico, button {
    background: #F7C325; /* amarillo */
    color: #000; /* texto negro */
    border: none;
    padding: 12px 24px;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px #F7C325;
  }

  .boton-magico:hover, button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #F7C325;
  }

  /* ===== Bloques de contenido ===== */
  .bloque {
    max-width: 1000px;
    margin: 60px auto;
    display: flex;
    gap: 40px;
    align-items: center;
    padding: 0 80px;
  }

  .alternado {
    flex-direction: row;
  }

  .bloque img {
    width: 50%;
    border-radius: 15px;
    transition: 0.4s;
  }

  .magico:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 30px #F7C325;
  }

  /* ===== Centrado botón actividad ===== */
  .centrar {
    text-align: center;
    margin: 40px 0;
  }

  /* ===== Sección cuento (opcional) ===== */
  .cuento {
    padding: 20px;
  }

  @media (max-width: 768px) {
    .bloque {
      flex-direction: column;
      padding: 0 20px;
    }

    .bloque img {
      width: 100%;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Kidoria ✨</div>
</header>

<section class="cuento">
  <h1 id="titulo">El Viaje de Nuba</h1>

  <div class="controles">
    <button onclick="toggleMusica()">🎵 Música</button>
    <button onclick="traducir()">🌍 Traducir</button>
    <button onclick="toggleNarrador()">🎙️ Narrador</button>
  </div>

  <div class="bloque">
    <img src="https://picsum.photos/500/300" class="magico">
    <p id="p1">Nuba soñaba con cruzar el gran valle dorado.</p>
  </div>

  <div class="bloque alternado">
    <p id="p2">Todos decían que era demasiado pequeño para intentarlo.</p>
    <img src="https://picsum.photos/501/300" class="magico">
  </div>

  <div class="bloque alternado">
    <img src="https://picsum.photos/502/300" class="magico">
    <p id="p3">Pero escuchó su corazón y dio el primer paso hacia la aventura.</p>
  </div>

  <div class="centrar">
    <a href="actividad.html" class="boton-magico">Ir a la actividad infantil</a>
  </div>

</section>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<audio id="narrador">
  <source src="narrador.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

  <footer>
    <button onclick="window.location.href='Esquiva.html'">Anar a activitats</button>
  </footer>
</body>
</html>
